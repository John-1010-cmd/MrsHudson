server:
  port: 8080
  servlet:
    session:
      timeout: 7d

spring:
  application:
    name: mrshudson

  # Database
  datasource:
    url: jdbc:mysql://localhost:3306/mrshudson?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5s

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

# Logging
logging:
  level:
    com.mrshudson: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Kimi AI Configuration
kimi:
  api-key: ${KIMI_API_KEY:your-api-key-here}
  base-url: https://api.moonshot.cn/v1
  model: moonshot-v1-8k
  timeout: 30000
