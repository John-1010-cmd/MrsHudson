server:
  port: 8080
  servlet:
    session:
      timeout: 7d

spring:
  application:
    name: mrshudson

  # Database
  datasource:
    url: jdbc:mysql://localhost:3306/mrshudson?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: mrshudson
    password: mrshudson_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: mrshudson_redis
      database: 0
      timeout: 5s

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mrshudson.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Logging
logging:
  level:
    com.mrshudson: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# AI Model Configuration
# 支持: kimi (通用), kimi-for-coding (编程专用)
# 备选: zhipu(智谱GLM4), qwen(通义千问) - 暂未实现
ai:
  provider: ${AI_PROVIDER:kimi}
  kimi:
    api-key: ${KIMI_API_KEY:}
    base-url: https://api.moonshot.cn/v1
    model: moonshot-v1-8k
    timeout: 30000
    temperature: 0.7
    max-tokens: 4096

# Voice Configuration (讯飞语音)
voice:
  # 模拟模式（开发测试时使用，不调用真实API）
  mock-mode: false
  # 模拟返回文本
  mock-text: "你好，请帮我查询一下今天的天气"
  # 是否启用语音合成TTS（开发环境建议关闭，生产环境开启）
  enable-tts: true
  # TTS音频文件存储路径（相对路径，基于应用启动目录）
  tts-storage-path: uploads/tts/
  # 讯飞配置（mock-mode为false时需要配置）
  # 获取地址: https://www.xfyun.cn/
  xfyun-app-id: ${XFYUN_APP_ID:}
  xfyun-api-secret: ${XFYUN_API_SECRET:}
  xfyun-api-key: ${XFYUN_API_KEY:}
  # 语音识别ASR
  xfyun-asr-url: http://iat-api.xfyun.cn/v2/iat
  # 语音合成TTS
  xfyun-tts-url: https://tts-api.xfyun.cn/v2/tts
  # 发音人: x4_xiaoyan(讯飞小燕)、x4_yezi(讯飞小露)、aisjiuxu(讯飞许久)、aisjinger(讯飞小婧)、aisbabyxu(讯飞许小宝)
  xfyun-tts-voice: x4_xiaoyan

# Weather API Configuration (高德地图)
# 从 https://lbs.amap.com/ 获取API Key
weather:
  api-key: ${WEATHER_API_KEY:}
  base-url: https://restapi.amap.com/v3

# Job Configuration
job:
  reminder:
    # 提醒任务开关（开发期间可关闭）
    enabled: false

# JWT Configuration
jwt:
  # 密钥（建议使用至少256位的随机字符串）
  secret: ${JWT_SECRET:mrshudson-jwt-secret-key-change-in-production}
  # Access Token 过期时间（毫秒）
  access-token-expiration: 3600000  # 1小时
  # Refresh Token 过期时间（毫秒）
  refresh-token-expiration: 604800000  # 7天
  # Token 前缀
  token-prefix: Bearer
  # Token 请求头名称
  header-name: Authorization
