server:
  port: 8080
  servlet:
    session:
      timeout: 7d
    # 强制使用 UTF-8 编码（解决中文乱码）
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: mrshudson
  # 强制使用 UTF-8 编码
  banner:
    charset: UTF-8
  main:
    banner-mode: console
  # 输出编码配置
  output:
    ansi:
      enabled: always

  # Database
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/mrshudson?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:mrshudson}
    password: ${MYSQL_PASSWORD:mrshudson_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:mrshudson_redis}
      database: ${REDIS_DATABASE:0}
      timeout: 5s

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mrshudson.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Logging (配置在 logback-spring.xml 中)
logging:
  level:
    com.mrshudson: DEBUG
    org.springframework.web: INFO

# AI Model Configuration
# 支持: kimi, minimax
# 备选: zhipu(智谱GLM4), qwen(通义千问) - 暂未实现
ai:
  provider: ${AI_PROVIDER:kimi}
  kimi:
    api-key: ${KIMI_API_KEY:}
    base-url: https://api.moonshot.cn/v1
    model: moonshot-v1-8k
    timeout: 30000
    temperature: 0.7
    max-tokens: 4096
  minimax:
    api-key: ${MINIMAX_API_KEY:}
    base-url: https://api.minimax.chat/v1
    model: MiniMax-M2.7
    timeout: 30000
    temperature: 0.7
    max-tokens: 4096

# Voice Configuration (讯飞语音)
voice:
  # 模拟模式（开发测试时使用，不调用真实API）
  mock-mode: false
  # 模拟返回文本
  mock-text: "你好，请帮我查询一下今天的天气"
  # 是否启用语音合成TTS（开发环境建议关闭，生产环境开启）
  enable-tts: true
  # TTS 提供商策略模式：xfyun（默认）/ minimax（占位）/ noop
  tts-provider: ${TTS_PROVIDER:xfyun}
  # MiniMax TTS 配置（当 tts-provider=minimax 时生效，暂为占位）
  minimax-api-key: ${MINIMAX_TTS_API_KEY:}
  minimax-tts-voice: male-qn-qingse
  # TTS音频文件存储路径（相对路径，基于应用启动目录）
  tts-storage-path: uploads/tts/
  # TTS 音频访问基础URL（本地开发使用 localhost，部署时改为实际服务器地址）
  tts-base-url: ${TTS_BASE_URL:http://localhost:8080}
  # 讯飞配置（mock-mode为false时需要配置）
  # 获取地址: https://www.xfyun.cn/
  xfyun-app-id: ${XFYUN_APP_ID:}
  xfyun-api-secret: ${XFYUN_API_SECRET:}
  xfyun-api-key: ${XFYUN_API_KEY:}
  # 语音识别ASR
  xfyun-asr-url: http://iat-api.xfyun.cn/v2/iat
  # 语音合成TTS
  xfyun-tts-url: https://tts-api.xfyun.cn/v2/tts
  # 发音人: x4_xiaoyan(讯飞小燕)、x4_yezi(讯飞小露)、aisjiuxu(讯飞许久)、aisjinger(讯飞小婧)、aisbabyxu(讯飞许小宝)
  xfyun-tts-voice: x4_xiaoyan
  # 是否上传到 GitHub（开启后 TTS 文件会上传到 GitHub 仓库）
  upload-to-github: false

# GitHub Storage Configuration
# 从 https://github.com/settings/tokens 生成 Personal Access Token
github:
  enabled: false
  token: ${GITHUB_TOKEN:}
  owner: ${GITHUB_OWNER:}
  repo: ${GITHUB_REPO:ImgRepo}
  branch: ${GITHUB_BRANCH:master}
  path: tts/
  # GitHub Raw URL 前缀
  raw-url-prefix: https://raw.githubusercontent.com

# Weather API Configuration (高德地图)
# 从 https://lbs.amap.com/ 获取API Key
weather:
  api-key: ${WEATHER_API_KEY:}
  base-url: https://restapi.amap.com/v3

# Firebase Configuration
# 从 Firebase Console 下载服务账号 JSON 文件，放置到 resources 目录
firebase:
  project-id: ${FIREBASE_PROJECT_ID:}
  credentials-path: classpath:firebase-service-account.json

# Job Configuration
job:
  reminder:
    # 提醒任务开关（开发期间可关闭）
    enabled: false

# Intent Vector Cache Configuration (三级意图缓存)
# L1: 内存缓存 (Caffeine) - 5分钟 TTL
# L2: Redis Hash - 7天 TTL
# L3: Redis Vector (HNSW) - 30天 TTL (需要 Redis 7.2+ with RediSearch)
intent:
  cache:
    enabled: ${INTENT_CACHE_ENABLED:true}
    l1:
      enabled: ${INTENT_CACHE_L1_ENABLED:true}
      max-size: 500
      ttl: PT5M  # ISO-8601 duration format (5 minutes)
    l2:
      enabled: ${INTENT_CACHE_L2_ENABLED:true}
      key-prefix: "intent:L2"
      ttl: P7D   # ISO-8601 duration format (7 days)
    l3:
      enabled: ${INTENT_CACHE_L3_ENABLED:false}  # 默认禁用，需要 Redis 7.2+ with RediSearch
      index-name: "intent_l3_vector_idx"
      similarity-threshold: ${INTENT_CACHE_L3_SIMILARITY_THRESHOLD:0.92}
      ttl: P30D  # ISO-8601 duration format (30 days)
      vector-dimension: ${INTENT_CACHE_L3_VECTOR_DIMENSION:768}  # MiniMax: 768, Kimi: 1536
    circuit-breaker:
      enabled: ${INTENT_CACHE_CB_ENABLED:true}
      failure-threshold: ${INTENT_CACHE_CB_FAILURE_THRESHOLD:10}
      wait-duration-in-open-state: ${INTENT_CACHE_CB_WAIT_DURATION:60s}
      success-threshold: ${INTENT_CACHE_CB_SUCCESS_THRESHOLD:3}
      sliding-window-size: ${INTENT_CACHE_CB_WINDOW_SIZE:100}

# Actuator / Micrometer Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus  # 暴露关键端点
      base-path: /actuator  # 基础路径
  endpoint:
    health:
      show-details: when-authorized  # 认证后显示详细健康信息
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
        descriptions: true

# JWT Configuration
jwt:
  # 密钥（建议使用至少256位的随机字符串）
  secret: ${JWT_SECRET:mrshudson-jwt-secret-key-change-in-production}
  # Access Token 过期时间（毫秒）
  access-token-expiration: 3600000  # 1小时
  # Refresh Token 过期时间（毫秒）
  refresh-token-expiration: 604800000  # 7天
  # Token 前缀
  token-prefix: Bearer
  # Token 请求头名称
  header-name: Authorization
