server:
  port: 8080
  servlet:
    session:
      timeout: 7d

spring:
  application:
    name: mrshudson

  # Database
  datasource:
    url: jdbc:mysql://localhost:3306/mrshudson?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: mrshudson
    password: mrshudson_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: mrshudson_redis
      database: 0
      timeout: 5s

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mrshudson.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Logging
logging:
  level:
    com.mrshudson: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# AI Model Configuration
# 支持: kimi (通用), kimi-for-coding (编程专用)
# 备选: zhipu(智谱GLM4), qwen(通义千问) - 暂未实现
ai:
  provider: ${AI_PROVIDER:kimi}
  kimi:
    api-key: ${KIMI_API_KEY:}
    base-url: https://api.moonshot.cn/v1
    model: moonshot-v1-8k
    timeout: 30000
    temperature: 0.7
    max-tokens: 4096

# Voice Recognition Configuration (讯飞语音)
voice:
  # 模拟模式（开发测试时使用，不调用真实API）
  mock-mode: true
  # 模拟返回文本
  mock-text: "你好，请帮我查询一下今天的天气"
  # 讯飞配置（mock-mode为false时需要配置）
  # 获取地址: https://www.xfyun.cn/
  xfyun-app-id: ${XFYUN_APP_ID:}
  xfyun-api-secret: ${XFYUN_API_SECRET:}
  xfyun-api-key: ${XFYUN_API_KEY:}
  xfyun-asr-url: http://iat-api.xfyun.cn/v2/iat

# Weather API Configuration (高德地图)
# 从 https://lbs.amap.com/ 获取API Key
weather:
  api-key: ${WEATHER_API_KEY:}
  base-url: https://restapi.amap.com/v3
