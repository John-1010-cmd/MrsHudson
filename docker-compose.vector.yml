# Docker Compose - 向量数据库扩展配置
# 使用方法:
# 1. 仅基础服务: docker-compose up -d
# 2. 包含Chroma: docker-compose -f docker-compose.yml -f docker-compose.vector.yml up -d
# 3. 仅启动Chroma: docker-compose -f docker-compose.vector.yml up -d chroma

version: '3.8'

services:
  # Chroma 向量数据库（轻量级，推荐用于开发和中小规模生产）
  chroma:
    image: chromadb/chroma:0.4.22
    container_name: mrshudson-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - mrshudson-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Milvus 向量数据库（高性能，用于大规模生产）
  # 取消注释以下服务以使用Milvus
  # etcd:
  #   container_name: milvus-etcd
  #   image: quay.io/coreos/etcd:v3.5.5
